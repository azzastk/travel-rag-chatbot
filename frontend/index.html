<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VietTravel AI — Your Journey Starts Here</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sand: #f5ecd7;
        --sand2: #edd9b0;
        --teal: #1a6b6b;
        --teal2: #134f4f;
        --gold: #c8943a;
        --gold2: #e8b86d;
        --dark: #0f2020;
        --muted: #5a7a7a;
        --radius: 16px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--dark);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }
      .bg-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 80% 60% at 20% 10%,
            rgba(26, 107, 107, 0.35) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 80% at 80% 90%,
            rgba(200, 148, 58, 0.2) 0%,
            transparent 60%
          ),
          linear-gradient(160deg, #0f2020 0%, #122828 40%, #0a1a1a 100%);
      }
      .bg-pattern {
        position: fixed;
        inset: 0;
        z-index: 0;
        opacity: 0.04;
        background-image: repeating-linear-gradient(
          45deg,
          #c8943a 0,
          #c8943a 1px,
          transparent 0,
          transparent 50%
        );
        background-size: 28px 28px;
      }
      .deco {
        position: fixed;
        z-index: 0;
        pointer-events: none;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.12;
      }
      .deco1 {
        width: 400px;
        height: 400px;
        background: var(--teal);
        top: -100px;
        left: -100px;
        animation: floatA 12s ease-in-out infinite;
      }
      .deco2 {
        width: 300px;
        height: 300px;
        background: var(--gold);
        bottom: -80px;
        right: -80px;
        animation: floatB 15s ease-in-out infinite;
      }
      .deco3 {
        width: 200px;
        height: 200px;
        background: var(--teal2);
        top: 40%;
        right: 5%;
        animation: floatA 18s ease-in-out infinite reverse;
      }
      @keyframes floatA {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(20px, 30px);
        }
      }
      @keyframes floatB {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(-25px, -20px);
        }
      }
      .wrapper {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 820px;
        margin: 0 auto;
        width: 100%;
        padding: 0 16px;
      }
      header {
        padding: 20px 0 16px;
        display: flex;
        align-items: center;
        gap: 14px;
        border-bottom: 1px solid rgba(200, 148, 58, 0.2);
        animation: slideDown 0.6s ease both;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .logo-mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--teal), var(--teal2));
        border: 1px solid rgba(200, 148, 58, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
        box-shadow: 0 4px 20px rgba(26, 107, 107, 0.4);
      }
      .header-text h1 {
        font-family: "Playfair Display", serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--sand);
        line-height: 1.2;
      }
      .header-text p {
        font-size: 12px;
        color: var(--muted);
        font-weight: 300;
        margin-top: 2px;
      }
      .header-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .status-dot {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #4caf50;
        box-shadow: 0 0 6px rgba(76, 175, 80, 0.6);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .clear-btn {
        padding: 5px 12px;
        border-radius: 8px;
        border: 1px solid rgba(200, 148, 58, 0.25);
        background: rgba(200, 148, 58, 0.1);
        color: var(--sand2);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "DM Sans", sans-serif;
      }
      .clear-btn:hover {
        background: rgba(200, 148, 58, 0.2);
        border-color: var(--gold2);
        color: var(--gold2);
      }
      .suggestions {
        padding: 14px 0 8px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        animation: fadeIn 0.8s ease 0.3s both;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .suggestion-chip {
        padding: 7px 14px;
        border-radius: 999px;
        border: 1px solid rgba(200, 148, 58, 0.3);
        background: rgba(26, 107, 107, 0.15);
        color: var(--sand2);
        font-size: 12.5px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "DM Sans", sans-serif;
        white-space: nowrap;
      }
      .suggestion-chip:hover {
        background: rgba(26, 107, 107, 0.35);
        border-color: var(--gold2);
        color: var(--gold2);
        transform: translateY(-1px);
      }
      .chat-area {
        flex: 1;
        overflow-y: auto;
        padding: 12px 0 8px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scrollbar-width: thin;
        scrollbar-color: rgba(200, 148, 58, 0.2) transparent;
      }
      .chat-area::-webkit-scrollbar {
        width: 4px;
      }
      .chat-area::-webkit-scrollbar-thumb {
        background: rgba(200, 148, 58, 0.25);
        border-radius: 4px;
      }
      .msg {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        animation: msgIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .msg.user {
        flex-direction: row-reverse;
      }
      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      .avatar.bot {
        background: linear-gradient(135deg, var(--teal), var(--teal2));
        border: 1px solid rgba(200, 148, 58, 0.3);
        box-shadow: 0 2px 12px rgba(26, 107, 107, 0.3);
      }
      .avatar.user-av {
        background: linear-gradient(135deg, var(--gold), var(--gold2));
        border: 1px solid rgba(200, 148, 58, 0.5);
      }
      .bubble {
        max-width: 72%;
        padding: 12px 16px;
        border-radius: var(--radius);
        line-height: 1.65;
        font-size: 14.5px;
      }
      .bubble.bot {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(200, 148, 58, 0.15);
        color: var(--sand);
        border-bottom-left-radius: 4px;
        backdrop-filter: blur(10px);
      }
      .bubble.user {
        background: var(--teal);
        color: #fff;
        border-bottom-right-radius: 4px;
        box-shadow: 0 4px 20px rgba(26, 107, 107, 0.35);
      }
      .bubble-label {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 5px;
        opacity: 0.55;
      }
      .typing-indicator {
        display: flex;
        gap: 5px;
        align-items: center;
        padding: 6px 0;
      }
      .typing-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--gold2);
        opacity: 0.6;
        animation: typingBounce 1.2s ease-in-out infinite;
      }
      .typing-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes typingBounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-8px);
        }
      }
      .welcome {
        text-align: center;
        padding: 24px 16px 8px;
        animation: fadeIn 0.8s ease 0.5s both;
      }
      .welcome h2 {
        font-family: "Playfair Display", serif;
        font-size: 26px;
        color: var(--sand);
        line-height: 1.3;
        margin-bottom: 6px;
      }
      .welcome h2 em {
        color: var(--gold2);
        font-style: italic;
      }
      .welcome p {
        font-size: 13.5px;
        color: var(--muted);
        max-width: 400px;
        margin: 0 auto;
        line-height: 1.6;
      }
      .input-area {
        padding: 14px 0 20px;
        border-top: 1px solid rgba(200, 148, 58, 0.15);
        animation: slideUp 0.6s ease 0.2s both;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .input-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      .input-wrap {
        flex: 1;
      }
      textarea {
        width: 100%;
        padding: 13px 16px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(200, 148, 58, 0.25);
        border-radius: var(--radius);
        color: var(--sand);
        font-family: "DM Sans", sans-serif;
        font-size: 14.5px;
        resize: none;
        outline: none;
        line-height: 1.5;
        min-height: 50px;
        max-height: 140px;
        transition:
          border-color 0.2s,
          background 0.2s;
        backdrop-filter: blur(8px);
      }
      textarea::placeholder {
        color: var(--muted);
      }
      textarea:focus {
        border-color: rgba(200, 148, 58, 0.55);
        background: rgba(255, 255, 255, 0.09);
      }
      .send-btn {
        width: 50px;
        height: 50px;
        border-radius: 14px;
        flex-shrink: 0;
        background: linear-gradient(135deg, var(--teal), var(--teal2));
        border: 1px solid rgba(200, 148, 58, 0.3);
        color: var(--gold2);
        font-size: 20px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(26, 107, 107, 0.35);
      }
      .send-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(26, 107, 107, 0.5);
      }
      .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .input-hint {
        font-size: 11px;
        color: var(--muted);
        margin-top: 8px;
        text-align: center;
      }
      @media (max-width: 600px) {
        .bubble {
          max-width: 88%;
          font-size: 14px;
        }
        .welcome h2 {
          font-size: 22px;
        }
        .suggestion-chip {
          font-size: 12px;
          padding: 6px 11px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-layer"></div>
    <div class="bg-pattern"></div>
    <div class="deco deco1"></div>
    <div class="deco deco2"></div>
    <div class="deco deco3"></div>
    <div class="wrapper">
      <header>
        <div class="logo-mark">🌏</div>
        <div class="header-text">
          <h1>VietTravel AI</h1>
          <p>Trợ lý du lịch thông minh · Smart Travel Assistant</p>
        </div>
        <div class="header-right">
          <button class="clear-btn" onclick="clearChat()">🗑 New chat</button>
          <div class="status-dot">
            <div class="dot"></div>
            <span>Online</span>
          </div>
        </div>
      </header>
      <div class="suggestions" id="suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion(this)">
          🏖️ Best beaches in Vietnam
        </button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">
          🏔️ Địa điểm miền Bắc
        </button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">
          🌿 Nature destinations
        </button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">
          💰 Budget-friendly spots
        </button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">
          🏙️ Ho Chi Minh City
        </button>
      </div>
      <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
          <h2>Xin chào! Ready to <em>explore Vietnam?</em></h2>
          <p>
            Hỏi tôi về bất kỳ địa điểm du lịch nào tại Việt Nam.<br />Ask me
            anything about travel destinations in Vietnam.
          </p>
        </div>
      </div>
      <div class="input-area">
        <div class="input-row">
          <div class="input-wrap">
            <textarea
              id="inputBox"
              rows="1"
              placeholder="Hỏi về địa điểm du lịch... / Ask about travel destinations..."
              onkeydown="handleKey(event)"
              oninput="autoResize(this)"
            ></textarea>
          </div>
          <button
            class="send-btn"
            id="sendBtn"
            onclick="sendMessage()"
            title="Send"
          >
            ➤
          </button>
        </div>
        <div class="input-hint">
          Enter để gửi · Shift+Enter xuống dòng · Press Enter to send
        </div>
      </div>
    </div>
    <script>
      // Auto-detect: local dùng port 8000, production dùng cùng origin
      const API_URL =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
          ? "http://localhost:8000/chat"
          : window.location.origin + "/chat";

      const chatArea = document.getElementById("chatArea");
      const inputBox = document.getElementById("inputBox");
      const sendBtn = document.getElementById("sendBtn");
      let isLoading = false;
      let history = []; // Lưu lịch sử hội thoại

      function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 140) + "px";
      }

      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      function sendSuggestion(btn) {
        inputBox.value = btn.textContent.replace(/^[\p{Emoji}\s]+/u, "").trim();
        sendMessage();
      }

      function hideWelcome() {
        const w = document.getElementById("welcome");
        if (w) w.remove();
        const s = document.getElementById("suggestions");
        if (s) s.style.display = "none";
      }

      function clearChat() {
        history = [];
        chatArea.innerHTML = "";
        const welcome = document.createElement("div");
        welcome.className = "welcome";
        welcome.id = "welcome";
        welcome.innerHTML = `<h2>Xin chào! Ready to <em>explore Vietnam?</em></h2><p>Hỏi tôi về bất kỳ địa điểm du lịch nào tại Việt Nam.<br/>Ask me anything about travel destinations in Vietnam.</p>`;
        chatArea.appendChild(welcome);
        const s = document.getElementById("suggestions");
        if (s) s.style.display = "flex";
        inputBox.focus();
      }

      function appendMessage(role, text) {
        hideWelcome();
        const msg = document.createElement("div");
        msg.className = `msg ${role}`;
        const avatar = document.createElement("div");
        avatar.className = `avatar ${role === "bot" ? "bot" : "user-av"}`;
        avatar.textContent = role === "bot" ? "🌏" : "✈️";
        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        const label = document.createElement("div");
        label.className = "bubble-label";
        label.textContent = role === "bot" ? "VietTravel AI" : "You / Bạn";
        const content = document.createElement("div");
        content.innerHTML = formatText(text);
        bubble.appendChild(label);
        bubble.appendChild(content);
        msg.appendChild(avatar);
        msg.appendChild(bubble);
        chatArea.appendChild(msg);
        scrollToBottom();
      }

      function formatText(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.*?)\*/g, "<em>$1</em>")
          .replace(/\n/g, "<br/>");
      }

      function showTyping() {
        hideWelcome();
        const msg = document.createElement("div");
        msg.className = "msg bot";
        msg.id = "typing";
        const avatar = document.createElement("div");
        avatar.className = "avatar bot";
        avatar.textContent = "🌏";
        const bubble = document.createElement("div");
        bubble.className = "bubble bot";
        bubble.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        msg.appendChild(avatar);
        msg.appendChild(bubble);
        chatArea.appendChild(msg);
        scrollToBottom();
      }

      function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
      }

      function scrollToBottom() {
        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: "smooth" });
      }

      async function sendMessage() {
        const text = inputBox.value.trim();
        if (!text || isLoading) return;

        isLoading = true;
        sendBtn.disabled = true;
        inputBox.value = "";
        inputBox.style.height = "auto";

        appendMessage("user", text);
        showTyping();

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: text,
              history: history, // gửi kèm history
            }),
          });

          const data = await res.json();
          removeTyping();

          if (res.ok) {
            const answer = data.answer || "No response.";

            // Lưu vào history sau khi nhận được câu trả lời
            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: answer });

            // Giới hạn history 20 tin nhắn (10 lượt)
            if (history.length > 20) history = history.slice(-20);

            appendMessage("bot", answer);
          } else {
            appendMessage(
              "bot",
              `⚠️ Error: ${data.detail || "Something went wrong."}`,
            );
          }
        } catch (err) {
          removeTyping();
          appendMessage(
            "bot",
            "⚠️ Cannot connect to server.\n\nKhông thể kết nối server. Kiểm tra lại API.",
          );
        } finally {
          isLoading = false;
          sendBtn.disabled = false;
          inputBox.focus();
        }
      }
    </script>
  </body>
</html>
